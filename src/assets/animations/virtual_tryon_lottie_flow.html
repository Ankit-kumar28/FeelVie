
<style>
  #vto-root { font-family: sans-serif; background: #fff; border-radius: 20px; overflow: hidden; width: 100%; max-width: 680px; margin: 0 auto; }
  #vto-canvas { width: 100%; display: block; }

  @keyframes vto-fadein { from { opacity:0 } to { opacity:1 } }
  @keyframes vto-slideup { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
  @keyframes vto-phone-appear { from { opacity:0; transform: scale(0.82) translateY(24px) } to { opacity:1; transform: scale(1) translateY(0) } }

  @keyframes vto-scan { 0%,100% { transform: translateY(0px) } 50% { transform: translateY(130px) } }
  @keyframes vto-pulse { 0%,100% { opacity:0.25; transform:scale(1) } 50% { opacity:0.7; transform:scale(1.15) } }
  @keyframes vto-spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
  @keyframes vto-sparkle { 0%,100% { opacity:0; transform:scale(0) rotate(0deg) } 50% { opacity:1; transform:scale(1) rotate(180deg) } }
  @keyframes vto-bounce { 0%,100% { transform:translateY(0) } 40% { transform:translateY(-9px) } }
  @keyframes vto-barfill { from { width:0% } to { width:100% } }
  @keyframes vto-checkpop { 0% { transform:scale(0) } 70% { transform:scale(1.2) } 100% { transform:scale(1) } }
  @keyframes vto-shimmer { 0%,100% { opacity:0.55 } 50% { opacity:1 } }
  @keyframes vto-float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-7px) } }
  @keyframes vto-glow-ring { 0%,100% { opacity:0.18; r:22 } 50% { opacity:0.55; r:28 } }
  @keyframes vto-upload-arrow { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-6px) } }
  @keyframes vto-result-slide { from { opacity:0; transform:translateX(22px) } to { opacity:1; transform:translateX(0) } }
  @keyframes vto-tag-pop { 0% { transform:scale(0) } 80% { transform:scale(1.1) } 100% { transform:scale(1) } }

  .step-card {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 22px;
    min-height: 420px;
    justify-content: flex-start;
    background: #fff;
  }
  .step-card.active { display: flex; animation: vto-fadein 0.45s ease; }

  .step-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.2px;
    color: #B03385;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .step-title {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 22px;
    text-align: center;
  }

  .phone-frame {
    width: 148px;
    height: 270px;
    border-radius: 24px;
    border: 2.5px solid #ddd;
    background: #f8f0f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    position: relative;
    animation: vto-phone-appear 0.5s ease;
  }
  .phone-notch {
    width: 52px; height: 10px;
    background: #ddd;
    border-radius: 0 0 8px 8px;
    margin-top: 0;
    flex-shrink: 0;
  }
  .phone-screen {
    flex: 1; width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px;
    box-sizing: border-box;
  }

  .btn-generate {
    background: #B03385;
    color: #fff;
    border: none;
    border-radius: 22px;
    padding: 11px 32px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 20px;
    animation: vto-shimmer 2s ease-in-out infinite;
  }
  .btn-generate:hover { background: #8C2668; }

  .dots-row {
    display: flex; gap: 8px; margin-top: 24px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #e0b8d4;
  }
  .dot.active { background: #B03385; }

  .nav-row {
    display: flex; gap: 12px; margin-top: 20px; align-items: center;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 7px 22px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
  }
  .nav-btn:hover { background: #f5f0f8; }
  .nav-btn.primary {
    background: #B03385; color: #fff; border-color: #B03385;
  }
  .nav-btn.primary:hover { background: #8C2668; }
</style>

<script>
  var current = 0;
  function goStep(n) {
    document.getElementById('step-' + current).classList.remove('active');
    current = n;
    document.getElementById('step-' + current).classList.add('active');
  }

  function animateUpload() {
    var check = document.getElementById('upload-check');
    check.style.opacity = '0';
    check.style.animation = 'none';
    setTimeout(function() {
      check.style.animation = 'vto-checkpop 0.5s ease forwards';
      check.style.opacity = '1';
      setTimeout(function() { goStep(2); }, 900);
    }, 50);
  }

  function animateGenerate() {
    var btn = document.getElementById('gen-btn');
    btn.textContent = 'Generating...';
    btn.style.background = '#8C2668';
    btn.disabled = true;
    setTimeout(function() {
      goStep(4);
      btn.textContent = 'Generate Try-On';
      btn.style.background = '#B03385';
      btn.disabled = false;
    }, 2200);
  }
</script>
